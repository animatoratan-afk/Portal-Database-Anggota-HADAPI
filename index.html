<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HADAPI-PEDIA | LOGIN ADMIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="hdp.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        html, body {
            display: grid; height: 100%; width: 100%; place-items: center;
            background-image: linear-gradient(62deg, #751c1c 0%, #211296 100%);
        }
        .wrapper {
            overflow: hidden; max-width: 390px; background: #fff;
            padding: 30px; border-radius: 15px;
            box-shadow: rgb(38, 57, 77) 0px 20px 30px -10px;
        }
        .title { font-size: 30px; font-weight: 600; text-align: center; color: #012780; margin-bottom: 20px; }
        .field { height: 50px; width: 100%; margin-top: 15px; }
        .field input {
            height: 100%; width: 100%; padding-left: 15px;
            border-radius: 10px; border: 1px solid lightgray; outline: none;
        }
        .field-btn input {
            width: 100%; height: 50px; border: none; border-radius: 10px;
            background: #012780; color: #fff; font-weight: 600; cursor: pointer; margin-top: 20px;
        }
        .field-btn input:hover { background: #011c5b; }
        .pass-link { margin-top: 15px; text-align: center; font-size: 14px; }
        .pass-link a { color: #012780; text-decoration: none; }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #012780; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            color: white; opacity: 0; pointer-events: none; transition: 0.5s ease;
        }
        #loading-screen.active { opacity: 1; pointer-events: all; }
        .loader {
            width: 60px; height: 60px; border: 5px solid #fff;
            border-top: 5px solid #fc6e6e; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader"></div>
        
        <p>Memverifikasi Akses...</p>
        <img src="hdp.png" width="70px" alt="">
    </div>

    <div class="wrapper text-center">
        <img src="hdp.png" width="60px" class="mb-2" alt="Logo HADAPI">
        <div class="title">Login Admin</div>
        <form action="#" class="login">
            <div class="field">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="field">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="pass-link"><a href="#" id="forgotPassword">Lupa Password?</a></div>
            <div class="field-btn">
                <input type="submit" value="Masuk Ke Dashboard">
            </div>
        </form>
    </div>

    <script>
        const loginForm = document.querySelector(".login");
        const loading = document.getElementById("loading-screen");

        // --- KONFIGURASI LOGIN ANDA ---
        const USER_ADMIN = "admin_hadapi"; 
        const PASS_ADMIN = "hadapi2026";

        loginForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const usernameInput = document.getElementById("username").value;
            const passwordInput = document.getElementById("password").value;

            if (usernameInput === USER_ADMIN && passwordInput === PASS_ADMIN) {
                
                document.querySelector("#loading-screen p").innerText = "Selamat Datang, Admin!";
                loading.classList.add("active");

                setTimeout(() => {
                    localStorage.setItem("isLoggedIn", "true");
                    localStorage.setItem("namaPendaftar", "Admin HADAPI");
                    window.location.href = "index1a.html"; // Pastikan file ini ada
                }, 2000);

            } else {
                alert("Username atau Password Salah!");
            }
        });

        document.getElementById("forgotPassword").onclick = (e) => {
            e.preventDefault();
            alert("Silahkan hubungi tim IT untuk reset password.");
        };
    </script>
    <script>
    // 1. Matikan Klik Kanan
    document.addEventListener('contextmenu', event => event.preventDefault());

    // 2. Matikan Shortcut Keyboard (F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U)
    document.onkeydown = function (e) {
        if (e.keyCode == 123) { // F12
            return false;
        }
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Inspect
            return false;
        }
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Console
            return false;
        }
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // View Source
            return false;
        }
    };

    // 3. Anti-Debugger (Membingungkan tool Inspect jika terbuka)
    setInterval(function(){
        debugger;
    }, 100);
</script>
</body>
</html>
